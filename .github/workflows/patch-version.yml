
name: Patch Version

on:
  workflow_call:

jobs:

  patch_version:
    runs-on: ubuntu-24.04
    steps:

    - uses: actions/checkout@v6 

    - name: Patch Version
      run: |
        scripts/patch_version

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: icloudpd-version-info
        if-no-files-found: error
        path: |
          src/foundation/__init__.py
